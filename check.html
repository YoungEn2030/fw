<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>防伪查询</title>
<style>
body {background:#fff;margin:0;padding:20px;font-family:微软雅黑;}
.header {text-align:center;margin-bottom:30px;}
.header h1 {font-size:20px;color:#333;}
.card {background:#fff;border-radius:12px;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
.input-wrap {display:flex;align-items:center;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:30px;}
#codeInput {flex:1;padding:14px;font-size:16px;border:none;outline:none;}
#submitBtn {background:#0066ff;color:#fff;border:none;padding:14px 20px;cursor:pointer;}
.tip-title {font-size:18px;font-weight:bold;margin-bottom:15px;}
.tip-item {display:flex;align-items:center;margin-bottom:15px;}
.tip-icon {width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;margin-right:10px;}
.green {background:#28a745;}
.yellow {background:#ffc107;color:#333;}
.red {background:#dc3545;}
.footer {text-align:center;margin-top:30px;color:#999;font-size:14px;}
</style>
</head>
<body>
<div class="header">
    <h1>防伪查询</h1>
    <p style="color:#999;font-size:14px;">www.fwcxxx.cn</p>
</div>

<div class="card">
    <div class="tip-title">请输码，或扫描二维码查真伪</div>
    <p style="color:#666;font-size:12px;margin-bottom:20px;">Please input the code or scan the QR code to check the authenticity</p>

    <div class="input-wrap">
        <input type="text" id="codeInput" placeholder="请在此输入12位防伪密码" maxlength="12">
        <button id="submitBtn">确定</button>
    </div>

    <div class="tip-title">验证提示</div>
    <p style="color:#666;font-size:14px;margin-bottom:20px;">请对照您所购买的产品上的防伪标识，依次输入防伪密码 验证结果分为以下三种情况：</p>

    <div class="tip-item">
        <div class="tip-icon green">✓</div>
        <div>
            <div style="font-weight:bold;">正确查询</div>
            <div style="color:#666;font-size:14px;">即您所购买的商品为正牌产品</div>
        </div>
    </div>

    <div class="tip-item">
        <div class="tip-icon yellow">↻</div>
        <div>
            <div style="font-weight:bold;">重复查询</div>
            <div style="color:#666;font-size:14px;">即同一验证码被多次查验，请确认首次查验是否由您本人所为，若非本人所为，则可能为假冒商品</div>
        </div>
    </div>

    <div class="tip-item">
        <div class="tip-icon red">!</div>
        <div>
            <div style="font-weight:bold;">错误查询</div>
            <div style="color:#666;font-size:14px;">即验证码不存在，您所购买的产品未经官方验证</div>
        </div>
    </div>
</div>

<div class="footer">Copyright © 2023 产品信息验证中心</div>

<script>
function getUrlParam(name) {
    let url = location.search;
    let reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
    let r = url.substr(1).match(reg);
    return r ? decodeURIComponent(r[2]) : '';
}

let qrCode = getUrlParam("code");
let db = JSON.parse(localStorage.getItem("antiFakeDB") || "{}");

db["123456789012"] = { status: "new" };
db["987654321098"] = { status: "new" };
localStorage.setItem("antiFakeDB", JSON.stringify(db));

if (qrCode) {
    document.getElementById("codeInput").value = qrCode;
}

document.getElementById("submitBtn").onclick = function() {
    let inputCode = document.getElementById("codeInput").value.trim();
    if (!inputCode) {
        alert("请输入12位防伪密码");
        return;
    }
    if (inputCode.length !== 12) {
        alert("请输入完整的12位防伪密码");
        return;
    }
    if (!db[inputCode]) {
        alert("❌ 错误查询：验证码不存在，该产品未经官方验证");
        return;
    }
    if (db[inputCode].status === "used") {
        alert("⚠️ 重复查询：该验证码已被多次查验，请确认是否为您本人操作");
        return;
    }
    db[inputCode].status = "used";
    localStorage.setItem("antiFakeDB", JSON.stringify(db));
    alert("✅ 正确查询：该商品为正牌产品");
}
</script>
</body>
</html>
