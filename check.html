<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防伪查询</title>
<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {background:#f3f3f3; font-family:"微软雅黑",sans-serif;}

/* 顶部空白缩小 */
.header {text-align:center; padding:10px 0;}
.header h1 {font-size:20px; margin-bottom:4px;}
.header .domain {font-size:13px; color:#666;}

/* 卡片紧凑 */
.card {
    background:#fff;
    margin:10px 15px 0;
    border-radius:10px;
    padding:20px 15px;
}
.card h2 {font-size:17px; margin-bottom:6px;}
.card .en {
    font-size:11px;
    color:#666;
    margin-bottom:18px;
    line-height:1.3;
}

.input-wrap {
    display:flex;
    align-items:center;
    border-bottom:1px solid #eee;
    margin-bottom:20px;
    padding:6px 0;
}
#codeInput {
    flex:1;
    border:none;
    outline:none;
    font-size:16px;
}
#submitBtn {
    border:none;
    background:none;
    font-size:16px;
    color:#0066ff;
    padding:5px;
}

.tip-section h3 {font-size:16px; margin-bottom:10px;}
.tip-section .item {
    display:flex;
    align-items:center;
    margin-bottom:10px;
    font-size:14px;
}
.tip-section .item .icon {
    width:24px;
    height:24px;
    border-radius:50%;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-right:8px;
    font-size:12px;
    flex-shrink:0;
}
.green {background:#39c570;}
.yellow {background:#f2a93b;}
.red {background:#f26c6c;}

.result-card {
    background:#fff;
    margin:15px;
    border-radius:10px;
    padding:25px 20px;
    display:none;
}
.result-card h3 {font-size:16px; margin-bottom:10px;}
#showCode {font-size:20px; margin-bottom:15px;}
#resultText {
    font-size:15px;
    line-height:1.8;
}

.modal {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    align-items:center;justify-content:center;
}
.modal .box {
    background:#fff;
    padding:25px;
    border-radius:8px;
    text-align:center;
}
.modal .ok {margin-top:15px; color:#0066ff; cursor:pointer;}
</style>
</head>

<body>
<div class="header">
    <h1>防伪查询</h1>
    <div class="domain">www.fwcxzx.cn</div>
</div>

<div class="card" id="queryCard">
    <h2>请输码，或扫描二维码查真伪</h2>
    <div class="en">Please input the code or scan the QR code to check the authenticity</div>

    <div class="input-wrap">
        <input type="text" id="codeInput" placeholder="请在此输入防伪密码" maxlength="12">
        <button id="submitBtn">确定</button>
    </div>

    <div class="tip-section">
        <h3>验证提示</h3>
        <div class="item"><div class="icon green">✓</div><div>正确查询：即您所购买的商品为正牌产品</div></div>
        <div class="item"><div class="icon yellow">↻</div><div>重复查询：即同一验证码被多次查验，请确认首次查验是否由您本人所为</div></div>
        <div class="item"><div class="icon red">!</div><div>错误查询：即验证码不存在，您所购买的产品未经官方验证</div></div>
    </div>
</div>

<div class="result-card" id="resultCard">
    <h3>您所查询防伪码为</h3>
    <div id="showCode"></div>
    <div id="resultText"></div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <div id="msg"></div>
        <div class="ok" onclick="closeModal()">确定</div>
    </div>
</div>

<script>
function $(id){return document.getElementById(id);}
function closeModal(){$("modal").style.display="none";}
function showMsg(t){$("msg").innerText=t; $("modal").style.display="flex";}

// 从二维码里获取当前正确验证码（强绑定！）
const urlParams = new URLSearchParams(location.search);
const REAL_CODE = urlParams.get("code");

$("submitBtn").onclick = function(){
    let input = $("codeInput").value.trim();

    if(input.length !== 12){
        showMsg("防伪码长度输入不正确!");
        return;
    }

    // 【强验证：直接和二维码里的真实码对比】
    if(input === REAL_CODE){
        // 第一次查询
        $("queryCard").style.display = "none";
        $("resultCard").style.display = "block";
        $("showCode").innerText = input;
        $("resultText").innerText = "您查询的防伪编码为正品，当前第1次查询。";
    } else {
        // 错误
        $("queryCard").style.display = "none";
        $("resultCard").style.display = "block";
        $("showCode").innerText = input;
        $("resultText").innerText = "您所查询的防伪码不存在，未经官方验证，请谨慎购买。";
    }
};
</script>
</body>
</html>
